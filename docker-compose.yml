version: '3.8'

services:
# Serviço do Banco de Dados
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: lacrei_saude_db
      POSTGRES_USER: postgres_user
      POSTGRES_PASSWORD: postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

# Serviço API Django
  web:
    build: .
    command: >
      bash -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgres://postgres_user:postgres_password@db:5432/lacrei_saude_db
      - SECRET_KEY=sua_chave_secreta_provisoria_aqui
      - DEBUG=True

volumes:
  postgres_data: